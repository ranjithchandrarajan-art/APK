<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dealer Auction Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#364586}

body{
  background:var(--brand);
  font-family:'Segoe UI',Arial,sans-serif;
  overflow:hidden;
  height:100vh;
}

/* TOP BAR */
.topbar{
  position:fixed;top:0;left:0;width:100%;height:36px;
  background:var(--brand);color:white;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:1000;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.topbar .brand-title{font-weight:700;font-size:15px;letter-spacing:.3px}
.topbar .search-wrap{display:flex;align-items:center;gap:6px}
.topbar input{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:white;border-radius:6px;padding:4px 10px;font-size:13px;
  outline:none;width:180px;
}
.topbar input::placeholder{color:rgba(255,255,255,.6)}
.topbar input:focus{background:rgba(255,255,255,.25)}

/* IFRAME */
iframe{
  position:absolute;
  top:36px;left:0;
  width:100vw;
  height:calc(100vh - 66px);
  border:none;
  display:block;
}

/* FOOTER */
.footerbar{
  position:fixed;bottom:0;left:0;width:100%;height:30px;
  background:var(--brand);color:rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;z-index:999;
  box-shadow:0 -2px 6px rgba(0,0,0,.4);
}

/* LOADING OVERLAY */
#loadingOverlay{
  position:fixed;inset:0;background:var(--brand);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:2000;transition:opacity .4s;
}
#loadingOverlay.hide{opacity:0;pointer-events:none}
.loader-logo{
  width:110px;height:110px;background:white;
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,.3);margin-bottom:24px;overflow:hidden;
}
.loader-logo img{max-width:80%;max-height:80%;object-fit:contain}
.loader-text{color:white;font-size:15px;font-weight:600;margin-bottom:16px}
.spinner{
  width:32px;height:32px;
  border:3px solid rgba(255,255,255,.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL BLUR (when image modal open in iframe) */
body.modal-open-iframe::after{
  content:'';position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingOverlay">
  <div class="loader-logo">
    <img src="https://drive.google.com/thumbnail?id=1FREFFtAgLbSXJfKGIR_f1OxGt5qR6vMX&sz=w400" alt="Logo">
  </div>
  <div class="loader-text">Loading Dealer Portal...</div>
  <div class="spinner"></div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand-title">🚗 Dealer Auction Portal</div>
  <div class="search-wrap">
    <input id="globalSearch" type="text" placeholder="Search vehicles..." oninput="globalSearch()">
  </div>
</div>

<!-- IFRAME -->
<iframe
  id="appFrame"
  src="https://script.google.com/macros/s/AKfycbxSfTAJKu7bp_S9GfPN8UE2uLLIMfnMrzvs0wRMOuKPvPX9aghilQy6oeYH4buH_4DG/exec"
  allowfullscreen
  allow="geolocation"
  onload="frameLoaded()">
</iframe>

<!-- FOOTER -->
<div class="footerbar">© 2026 Dealer Auction Platform &nbsp;|&nbsp; Secure Dealer Environment</div>

<script>
// ── LOADING OVERLAY ──────────────────────────────────────────
function frameLoaded() {
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hide');
    setTimeout(() => document.getElementById('loadingOverlay').remove(), 500);
  }, 800);
}

// ── GLOBAL SEARCH → IFRAME ────────────────────────────────────
function globalSearch() {
  const val = document.getElementById('globalSearch').value;
  document.getElementById('appFrame').contentWindow.postMessage(
    { type: 'GLOBAL_SEARCH', value: val }, '*'
  );
}

// ── MESSAGES FROM IFRAME ──────────────────────────────────────
window.addEventListener('message', e => {
  if (e.data === 'OPEN_MODAL') {
    // Freeze wrapper scroll when image modal is open
    document.body.classList.add('modal-open-iframe');
  }
  if (e.data === 'CLOSE_MODAL') {
    document.body.classList.remove('modal-open-iframe');
  }
  if (e.data === 'DEALER_LOGOUT') {
    document.getElementById('appFrame').src += '?logout=true';
  }
});
</script>
</body>
</html>
