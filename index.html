<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dealer Auction Portal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#364586;--brand-dark:#2c3a73;--bar:44px;--foot:28px}

html,body{height:100%;background:var(--brand);font-family:'Segoe UI',system-ui,Arial,sans-serif;overflow:hidden}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--bar);
  background:var(--brand);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;z-index:1000;
  box-shadow:0 2px 10px rgba(0,0,0,.35);
  gap:10px;
}
.topbar-left{display:flex;align-items:center;gap:9px;flex-shrink:0}
.topbar-logo{
  width:28px;height:28px;border-radius:7px;background:white;
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;
}
.topbar-logo img{width:22px;height:22px;object-fit:contain}
.topbar-title{color:white;font-weight:800;font-size:14px;letter-spacing:.2px;white-space:nowrap}
.topbar-search{
  flex:1;max-width:280px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:white;border-radius:8px;padding:6px 12px;font-size:13px;outline:none;
  transition:background .2s;
}
.topbar-search::placeholder{color:rgba(255,255,255,.6)}
.topbar-search:focus{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5)}
.net-dot{
  width:9px;height:9px;border-radius:50%;background:#4ade80;flex-shrink:0;
  box-shadow:0 0 0 2px rgba(74,222,128,.3);transition:background .3s;
}
.net-dot.offline{background:#f87171;box-shadow:0 0 0 2px rgba(248,113,113,.3)}

/* ── IFRAME ── */
iframe{
  position:fixed;
  top:var(--bar);
  left:0;right:0;
  bottom:var(--foot);
  width:100%;
  height:calc(100% - var(--bar) - var(--foot));
  border:none;display:block;
}

/* ── FOOTER ── */
.footbar{
  position:fixed;bottom:0;left:0;right:0;height:var(--foot);
  background:var(--brand-dark);color:rgba(255,255,255,.65);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;z-index:999;letter-spacing:.2px;
  box-shadow:0 -2px 8px rgba(0,0,0,.3);
}

/* ── LOADING SCREEN ── */
#loader{
  position:fixed;inset:0;background:var(--brand);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:2000;transition:opacity .5s ease;
}
#loader.fade{opacity:0;pointer-events:none}
.loader-card{
  background:rgba(255,255,255,.12);backdrop-filter:blur(16px);
  border-radius:20px;padding:36px 32px;text-align:center;
  box-shadow:0 16px 40px rgba(0,0,0,.3);
}
.ldr-logo{
  width:100px;height:100px;background:white;border-radius:16px;
  margin:0 auto 20px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.ldr-logo img{width:80px;height:80px;object-fit:contain}
.ldr-title{color:white;font-size:18px;font-weight:800;margin-bottom:4px}
.ldr-sub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:22px}
.ldr-bar-wrap{width:200px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto}
.ldr-bar{height:4px;background:white;border-radius:2px;width:0;
  transition:width .4s ease;animation:ldrAnim 1.8s ease-in-out forwards}
@keyframes ldrAnim{
  0%{width:0}
  40%{width:60%}
  80%{width:85%}
  100%{width:100%}
}
.ldr-dots{margin-top:16px;display:flex;gap:7px;justify-content:center}
.ldot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);
  animation:ldotBounce 1.2s infinite}
.ldot:nth-child(2){animation-delay:.2s}
.ldot:nth-child(3){animation-delay:.4s}
@keyframes ldotBounce{
  0%,80%,100%{transform:scale(1);background:rgba(255,255,255,.4)}
  40%{transform:scale(1.4);background:white}
}

/* ── OFFLINE OVERLAY ── */
#offlineOverlay{
  display:none;position:fixed;inset:0;z-index:1500;
  background:rgba(54,69,134,.92);backdrop-filter:blur(4px);
  flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center;
}
#offlineOverlay.show{display:flex}
#offlineOverlay .oi{font-size:52px;margin-bottom:14px}
#offlineOverlay h4{font-weight:800;margin-bottom:8px}
#offlineOverlay p{font-size:14px;opacity:.8;margin-bottom:20px}
.btn-retry{background:white;color:var(--brand);font-weight:800;border:none;
  border-radius:10px;padding:11px 28px;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <div class="loader-card">
    <div class="ldr-logo">
      <img src="https://drive.google.com/thumbnail?id=1FREFFtAgLbSXJfKGIR_f1OxGt5qR6vMX&sz=w400" alt="Logo">
    </div>
    <div class="ldr-title">Dealer Auction Portal</div>
    <div class="ldr-sub">Loading your secure environment...</div>
    <div class="ldr-bar-wrap"><div class="ldr-bar"></div></div>
    <div class="ldr-dots">
      <div class="ldot"></div><div class="ldot"></div><div class="ldot"></div>
    </div>
  </div>
</div>

<!-- OFFLINE OVERLAY -->
<div id="offlineOverlay">
  <div class="oi">📡</div>
  <h4>You're Offline</h4>
  <p>Please check your internet connection<br>and try again.</p>
  <button class="btn-retry" onclick="retryConnection()">Try Again</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <img src="https://drive.google.com/thumbnail?id=1FREFFtAgLbSXJfKGIR_f1OxGt5qR6vMX&sz=w400" alt="Logo">
    </div>
    <div class="topbar-title">Dealer Auction Portal</div>
  </div>
  <input class="topbar-search" id="gSearch" type="text"
         placeholder="🔍 Search vehicles..." oninput="globalSearch(this.value)">
  <div class="net-dot" id="netDot" title="Online"></div>
</div>

<!-- IFRAME -->
<iframe id="appFrame"
  src="https://script.google.com/macros/s/AKfycbyTLSMhYZz00tfng24uCQkmMvwjZAz_7BDl4SYb_R6J6l1372E9LORd21UD1bH7PGbgcA/exec"
  allow="geolocation"
  allowfullscreen
  onload="onFrameLoad()">
</iframe>

<!-- FOOTER -->
<div class="footbar">© 2026 Dealer Auction Platform &nbsp;|&nbsp; Secure Dealer Environment</div>

<script>
// ── FRAME LOAD ────────────────────────────────────────────────
function onFrameLoad() {
  setTimeout(() => {
    const el = document.getElementById('loader');
    el.classList.add('fade');
    setTimeout(() => el.remove(), 500);
  }, 900);
}

// ── GLOBAL SEARCH → IFRAME ────────────────────────────────────
let searchDebounce;
function globalSearch(val) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const frame = document.getElementById('appFrame');
    if (frame?.contentWindow) {
      frame.contentWindow.postMessage({ type: 'GLOBAL_SEARCH', value: val }, '*');
    }
  }, 280);
}

// ── NETWORK STATUS ────────────────────────────────────────────
function updateNetStatus() {
  const online = navigator.onLine;
  const dot    = document.getElementById('netDot');
  dot.classList.toggle('offline', !online);
  dot.title = online ? 'Online' : 'Offline';
  document.getElementById('offlineOverlay').classList.toggle('show', !online);
}

window.addEventListener('online',  () => { updateNetStatus(); });
window.addEventListener('offline', () => { updateNetStatus(); });

function retryConnection() {
  if (navigator.onLine) {
    document.getElementById('offlineOverlay').classList.remove('show');
    document.getElementById('appFrame').src += '';  // reload frame
  }
}

// ── MESSAGES FROM IFRAME ──────────────────────────────────────
window.addEventListener('message', e => {
  if (e.data === 'OPEN_MODAL') {
    document.body.style.overflow = 'hidden';
  }
  if (e.data === 'CLOSE_MODAL') {
    document.body.style.overflow = '';
  }
  if (e.data === 'DEALER_LOGOUT') {
    const f = document.getElementById('appFrame');
    f.src   = f.src.split('?')[0] + '?logout=true';
  }
});

// ── INIT ──────────────────────────────────────────────────────
updateNetStatus();
</script>
</body>
</html>
